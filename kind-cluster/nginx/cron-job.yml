kind: CronJob
apiVersion: batch/v1
metadata:
  name: minute-backup
  namespace: nginx-ns
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          name: minute-backup-pod
          labels:
            app: minute-backup-pod
        spec:
          containers:
          - name: backup-container
            image: busybox:latest
            command:
            - sh
            - -c
            - >
              echo "Backup started" &&
              mkdir -p /backups &&
              mkdir -p /demo-data &&
              cp -r /demo-data /backups &&
              echo "Backup completed"
            volumeMounts:
              - name: data-volume
                mountPath: /demo-data
              - name: backup-volumes
                mountPath: /backups
          restartPolicy: OnFailure
          volumes:
            - name: data-volume
              hostPath: 
                path: /demo-data
                type: DirectoryOrCreate
            - name: backup-volumes
              hostPath:
                path: /backups
                type: DirectoryOrCreate
