kind: Deployment
apiVersion: apps/v1
metadata:
  name: apache-deployment
  namespace: apache-ns
spec:
  replicas: 3
  selector:
    matchLabels:
      app: apache
  template:
    metadata:
      name: apache-pod-deployment
      labels:
        app: apache
    spec:
      containers:
        - name: apache
          image: httpd:latest
          ports:
          - containerPort: 80
