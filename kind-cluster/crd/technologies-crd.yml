apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: technologies.startnew.io #name then add the group here
spec:
  group: startnew.io   # like apps for deployment
  names:
    plural: technologies
    singular: technology
    kind: Technology
    shortNames:
      - tech
      - techstack
      - skills
  scope: Namespaced #it could be used within namespaces as well
  versions:
  - name: v1 # just like other having apiVersions: v1
    served: true #it shows it can be runned
    storage: true #can store it
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              name:
                type: string
                description: "This is the name of technology"
              yoe:
                type: integer
                description: "This is year of experience" 
              expertise:
                type: string
                description: "This is the level of expertise"
